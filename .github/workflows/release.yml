name: Attach Release Asset

on:
  push:
    tags:
      - 'v*'

jobs:
  attach-asset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION=${GITHUB_REF_NAME}
          zip -r "CPT-${VERSION}.zip" . --exclude ".git/*"

      - name: Attach asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          if gh release view "${VERSION}" > /dev/null 2>&1; then
            gh release upload "${VERSION}" "CPT-${VERSION}.zip" --clobber
          else
            PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
            if [ -n "${PREV_TAG}" ]; then
              NOTES=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s" --no-merges)
            else
              NOTES=$(git log "${VERSION}" --pretty=format:"- %s" --no-merges)
            fi
            gh release create "${VERSION}" "CPT-${VERSION}.zip" --notes "${NOTES}" --title "${VERSION}"
          fi
